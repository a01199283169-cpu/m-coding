{% extends "base.html" %}

{% block title %}휴가 수정 - 휴가등록앱{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">
    <div class="mb-6">
        <h2 class="text-3xl font-bold text-gray-800">✏️ 휴가 수정</h2>
        <p class="text-gray-600 mt-2">휴가 정보를 수정하세요.</p>
    </div>

    <div class="bg-white rounded-lg shadow-lg p-8">
        <form method="POST" action="/leaves/{{ leave.id }}/edit" class="space-y-6">
            <!-- Leave Type -->
            <div>
                <label for="leave_type" class="block text-sm font-medium text-gray-700 mb-2">
                    휴가 종류 *
                </label>
                <select
                    id="leave_type"
                    name="leave_type"
                    required
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                >
                    {% for leave_type in leave_types %}
                    <option value="{{ leave_type.value }}" {% if leave.leave_type.value == leave_type.value %}selected{% endif %}>
                        {{ leave_type.value }}
                    </option>
                    {% endfor %}
                </select>
            </div>

            <!-- Start Date -->
            <div>
                <label for="start_date" class="block text-sm font-medium text-gray-700 mb-2">
                    시작일 *
                </label>
                <input
                    type="date"
                    id="start_date"
                    name="start_date"
                    value="{{ leave.start_date }}"
                    required
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                >
            </div>

            <!-- End Date -->
            <div>
                <label for="end_date" class="block text-sm font-medium text-gray-700 mb-2">
                    종료일 *
                </label>
                <input
                    type="date"
                    id="end_date"
                    name="end_date"
                    value="{{ leave.end_date }}"
                    required
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                >
            </div>

            <!-- Reason -->
            <div>
                <label for="reason" class="block text-sm font-medium text-gray-700 mb-2">
                    사유 (선택)
                </label>
                <textarea
                    id="reason"
                    name="reason"
                    rows="4"
                    maxlength="500"
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                    placeholder="휴가 사유를 입력하세요 (최대 500자)"
                >{{ leave.reason or "" }}</textarea>
                <p class="mt-1 text-sm text-gray-500">
                    <span id="char-count">{{ leave.reason|length if leave.reason else 0 }}</span> / 500자
                </p>
            </div>

            <!-- Buttons -->
            <div class="flex items-center justify-between">
                <form method="POST" action="/leaves/{{ leave.id }}/delete" onsubmit="return confirm('정말 삭제하시겠습니까?')">
                    <button
                        type="submit"
                        class="px-6 py-3 bg-red-600 text-white rounded-lg hover:bg-red-700 transition font-medium"
                    >
                        삭제
                    </button>
                </form>

                <div class="flex items-center space-x-4">
                    <a href="/leaves" class="px-6 py-3 border border-gray-300 rounded-lg hover:bg-gray-50 transition">
                        취소
                    </a>
                    <button
                        type="submit"
                        class="px-6 py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition font-medium"
                    >
                        수정 완료
                    </button>
                </div>
            </div>
        </form>
    </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
// Character counter
const reasonTextarea = document.getElementById('reason');
const charCount = document.getElementById('char-count');

reasonTextarea.addEventListener('input', () => {
    charCount.textContent = reasonTextarea.value.length;
});
</script>
{% endblock %}
