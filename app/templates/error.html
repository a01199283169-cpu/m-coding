{% extends "base.html" %}

{% block title %}오류 - 휴가등록앱{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto text-center mt-12">
    <div class="bg-white rounded-lg shadow-lg p-12">
        <div class="text-6xl mb-4">⚠️</div>
        <h2 class="text-3xl font-bold text-gray-800 mb-4">오류가 발생했습니다</h2>
        <p class="text-gray-600 mb-8">{{ error }}</p>
        <a href="/" class="inline-block bg-blue-600 text-white px-6 py-3 rounded-lg hover:bg-blue-700 transition font-medium">
            홈으로 돌아가기
        </a>
    </div>
</div>
{% endblock %}
